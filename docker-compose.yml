services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: citizengov_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - citizengov_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The Python app (Streamlit + processing backend)
  app:
    build: .
    container_name: citizengov_app
    ports:
      - "8501:8501"
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    networks:
      - citizengov_network

  # The API Backend for n8n Webhooks
  python-backend:
    build: .
    container_name: citizengov_api
    ports:
      - "8001:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    networks:
      - citizengov_network

networks:
  citizengov_network:
    driver: bridge

volumes:
  chroma_data:
