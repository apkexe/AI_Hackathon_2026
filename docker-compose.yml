services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: citizengov_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - citizengov_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CitizenGov App (Streamlit Dashboard + FastAPI Backend)
  app:
    image: ghcr.io/apkexe/citizengov:latest
    build: .
    container_name: citizengov_app
    ports:
      - "8501:8501"   # Streamlit Dashboard
      - "8001:8000"   # FastAPI API (for n8n webhooks)
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    networks:
      - citizengov_network
    restart: unless-stopped

networks:
  citizengov_network:
    driver: bridge

volumes:
  chroma_data:
